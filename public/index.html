<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>VTuber World - Guia Completo sobre VTubers | Virtual YouTubers Brasil</title>
    <meta name="description" content="Descubra o mundo dos VTubers! Guia completo sobre Virtual YouTubers, principais streamers, como se tornar um VTuber e glossário completo. Tudo sobre Hololive, Nijisanji e mais.">
    <meta name="keywords" content="VTuber, Virtual YouTuber, streaming, avatar virtual, Hololive, Nijisanji, Live2D, Twitch, YouTube, Brasil, como ser VTuber">
    <meta name="author" content="VTuber World">
    <meta name="robots" content="index, follow">
    <meta name="language" content="pt-BR">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vtubers.com.br/">
    <meta property="og:title" content="VTuber World - Guia Completo sobre Virtual YouTubers">
    <meta property="og:description" content="Descubra o mundo dos VTubers! Guia completo sobre Virtual YouTubers, principais streamers, como se tornar um VTuber e glossário completo.">
    <meta property="og:image" content="https://vtubers.com.br/assets/logo.png">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="VTuber World">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vtubers.com.br/">
    <meta property="twitter:title" content="VTuber World - Guia Completo sobre Virtual YouTubers">
    <meta property="twitter:description" content="Descubra o mundo dos VTubers! Guia completo sobre Virtual YouTubers, principais streamers, como se tornar um VTuber e glossário completo.">
    <meta property="twitter:image" content="https://vtubers.com.br/assets/logo.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://vtuber-world.replit.app/">
    
    <!-- Favicon -->
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "VTuber World",
      "alternateName": "Virtual YouTuber World",
      "url": "https://vtuber-world.replit.app/",
      "description": "Guia completo sobre VTubers (Virtual YouTubers), incluindo informações sobre streamers populares, como se tornar um VTuber e glossário de termos",
      "inLanguage": "pt-BR",
      "author": {
        "@type": "Organization",
        "name": "VTuber World"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://vtuber-world.replit.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
